<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AriexAI Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #e8f0fe 0%, #f0e8ff 50%, #e8f4ff 100%);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: #ffffff;
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
  }

  .logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #4f6ef7, #7c3aed);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    font-weight: 800;
    color: white;
    margin: 0 auto 24px;
    position: relative;
    box-shadow: 0 8px 24px rgba(79, 110, 247, 0.35);
  }

  .logo::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 22px;
    background: linear-gradient(135deg, rgba(79,110,247,0.3), rgba(124,58,237,0.3));
    z-index: -1;
    filter: blur(8px);
  }

  .welcome {
    font-size: 15px;
    color: #888;
    font-weight: 400;
    margin-bottom: 4px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #111;
    margin-bottom: 10px;
    letter-spacing: -0.5px;
  }

  h1 span { color: #4f6ef7; }

  .subtitle {
    color: #888;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 32px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 14px 20px;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 12px;
  }

  .btn-google {
    background: #ffffff;
    color: #333;
    border: 1.5px solid #e0e0e0;
  }
  .btn-google:hover { background: #f8f8f8; border-color: #ccc; }

  .btn-email {
    background: linear-gradient(135deg, #4f6ef7, #7c3aed);
    color: #ffffff;
    border: none;
    box-shadow: 0 4px 16px rgba(79,110,247,0.35);
  }
  .btn-email:hover { opacity: 0.92; transform: translateY(-1px); }

  .btn-demo {
    background: #ffffff;
    color: #4f6ef7;
    border: 1.5px solid #e0e0e0;
    font-weight: 600;
  }
  .btn-demo:hover { background: #f5f7ff; border-color: #4f6ef7; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 4px 0 12px;
    color: #bbb;
    font-size: 13px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #eee;
  }

  .footer {
    margin-top: 24px;
    font-size: 12px;
    color: #aaa;
    line-height: 1.6;
  }

  .footer a { color: #4f6ef7; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  .powered {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #f5f5f5;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: #666;
    margin-top: 20px;
  }

  .powered-dot {
    width: 7px; height: 7px;
    background: #22c55e;
    border-radius: 50%;
    box-shadow: 0 0 6px #22c55e;
  }

  .error {
    background: rgba(244,67,54,0.08);
    border: 1px solid rgba(244,67,54,0.2);
    color: #f44336;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  /* Email modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: white;
    border-radius: 20px;
    padding: 36px 32px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 16px 48px rgba(0,0,0,0.15);
  }
  .modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #111; }
  .modal p { font-size: 13px; color: #888; margin-bottom: 24px; }
  .input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .input:focus { border-color: #4f6ef7; }
  .modal-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #4f6ef7, #7c3aed);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.2s;
  }
  .modal-btn:hover { opacity: 0.9; }
  .modal-close {
    margin-top: 12px;
    font-size: 13px;
    color: #888;
    cursor: pointer;
  }
  .modal-close:hover { color: #444; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">A</div>
  <div class="welcome">Welcome to</div>
  <h1>Ariex<span>AI</span></h1>
  <p class="subtitle">Your AI-powered civil engineering assistant.<br/>Sign in to access Cortex.</p>

  <button class="btn btn-google" onclick="signInWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <button class="btn btn-email" onclick="document.getElementById('emailModal').classList.add('active')">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
    </svg>
    Continue with Email
  </button>

  <div class="divider">or</div>

  <button class="btn btn-demo" onclick="tryDemo()">
    Try Demo Access
  </button>

  <div class="error" id="errorMsg"></div>

  <div class="footer">
    By signing in you agree to AriexAI
    <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
  </div>

  <div class="powered">
    <div class="powered-dot"></div>
    Powered by Advanced AI
  </div>
</div>

<!-- Email OTP Modal -->
<div class="modal-overlay" id="emailModal">
  <div class="modal">
    <h2>Sign in with Email</h2>
    <p>Enter your email and we'll send you a magic link</p>
    <input class="input" type="email" id="emailInput" placeholder="your@email.com"/>
    <button class="modal-btn" onclick="sendMagicLink()">Send Magic Link</button>
    <div class="modal-close" onclick="document.getElementById('emailModal').classList.remove('active')">Cancel</div>
    <div class="error" id="emailError"></div>
  </div>
</div>

<script>
  const { createClient } = supabase
  const client = createClient(
    'https://yvgvcszfdegjxgsggtcg.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2Z3Zjc3pmZGVnanhnc2dndGNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDI3MzYsImV4cCI6MjA5MDUxODczNn0.AHLSt81SyVLSCZU3vj6DS0tq0nYd4vY5bIHLqSxUZYE'
  )

  async function checkSession() {
    const { data: { session } } = await client.auth.getSession()
    if (session) window.location.href = '/'
  }
  checkSession()

  async function signInWithGoogle() {
    const { error } = await client.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/' }
    })
    if (error) showError('errorMsg', error.message)
  }

  async function sendMagicLink() {
    const email = document.getElementById('emailInput').value.trim()
    if (!email) return showError('emailError', 'Please enter your email')

    const { error } = await client.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + '/' }
    })

    if (error) {
      showError('emailError', error.message)
    } else {
      document.getElementById('emailModal').innerHTML = `
        <div class="modal">
          <div style="font-size:48px;margin-bottom:16px">📧</div>
          <h2>Check your email!</h2>
          <p style="margin-bottom:0">We sent a magic link to <strong>${email}</strong>. Click it to sign in.</p>
        </div>
      `
    }
  }

  function tryDemo() {
    window.location.href = '/'
  }

  function showError(id, msg) {
    const el = document.getElementById(id)
    el.style.display = 'block'
    el.textContent = msg
  }
</script>
</body>
</html>
