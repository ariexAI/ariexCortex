<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ariex Cortex</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f0f4f9;
    --surface: #ffffff;
    --surface2: #f5f7fa;
    --border: #e4e9f0;
    --accent: #5c6ef5;
    --accent2: #7b8ff8;
    --accent-soft: #eef0fe;
    --text: #1a1d2e;
    --text2: #4a5068;
    --muted: #9198b0;
    --user-bubble: #5c6ef5;
    --ai-bubble: #ffffff;
    --success: #22c55e;
    --tag-calc: #dcfce7;
    --tag-calc-text: #16a34a;
    --tag-eng: #fef9c3;
    --tag-eng-text: #ca8a04;
    --tag-ai: #ede9fe;
    --tag-ai-text: #7c3aed;
    --tag-err: #fee2e2;
    --tag-err-text: #dc2626;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
    --shadow-card: 0 2px 8px rgba(92,110,245,0.08), 0 1px 3px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    box-shadow: var(--shadow-sm);
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 11px;
  }

  .logo-icon {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px rgba(92,110,245,0.35);
  }

  .logo-icon svg {
    width: 20px; height: 20px;
    fill: none;
    stroke: #fff;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .logo-text {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.4px;
    color: var(--text);
  }

  .logo-text span { color: var(--accent); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 0 2px rgba(34,197,94,0.25);
    animation: pulse 2.4s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 2px rgba(34,197,94,0.25); }
    50% { box-shadow: 0 0 0 4px rgba(34,197,94,0.1); }
  }

  /* ── CHAT AREA ── */
  .chat-wrapper {
    flex: 1;
    overflow-y: auto;
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
  }

  .chat-wrapper::-webkit-scrollbar { width: 5px; }
  .chat-wrapper::-webkit-scrollbar-track { background: transparent; }
  .chat-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

  /* ── WELCOME ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px 20px;
    animation: fadeUp 0.5s ease;
  }

  .welcome-icon-wrap {
    width: 72px; height: 72px;
    background: var(--accent);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 22px;
    box-shadow: 0 8px 24px rgba(92,110,245,0.3);
  }

  .welcome-icon-wrap svg {
    width: 36px; height: 36px;
    fill: none;
    stroke: #fff;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .welcome h2 {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.8px;
    margin-bottom: 10px;
    text-align: center;
  }

  .welcome h2 span { color: var(--accent); }

  .welcome p {
    color: var(--text2);
    font-size: 14.5px;
    line-height: 1.65;
    max-width: 480px;
    text-align: center;
    margin-bottom: 36px;
    font-weight: 400;
  }

  /* ── SUGGESTION CARDS GRID ── */
  .suggestion-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width: 100%;
    max-width: 760px;
  }

  .suggestion-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: var(--shadow-card);
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  .suggestion-card:hover {
    border-color: var(--accent2);
    box-shadow: 0 4px 16px rgba(92,110,245,0.15);
    transform: translateY(-2px);
  }

  .suggestion-card:active {
    transform: translateY(0);
  }

  .card-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: var(--accent-soft);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .card-icon svg {
    width: 18px; height: 18px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .card-content {}

  .card-title {
    font-size: 13.5px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

  .card-subtitle {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── MESSAGES ── */
  .message {
    display: flex;
    gap: 11px;
    animation: fadeUp 0.3s ease;
    max-width: 820px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; align-self: flex-end; }
  .message.ai   { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
    font-size: 14px;
  }

  .message.user .avatar {
    background: var(--accent-soft);
    border: 1px solid rgba(92,110,245,0.2);
    font-size: 13px;
  }

  .message.ai .avatar {
    background: var(--accent);
    box-shadow: 0 2px 8px rgba(92,110,245,0.3);
  }

  .message.ai .avatar svg {
    width: 16px; height: 16px;
    stroke: #fff;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .bubble {
    padding: 13px 17px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.7;
    max-width: 640px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 3px 12px rgba(92,110,245,0.25);
    font-weight: 500;
  }

  .message.ai .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow-sm);
    color: var(--text);
  }

  .category-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 6px;
    margin-bottom: 9px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .tag-calculation { background: var(--tag-calc); color: var(--tag-calc-text); }
  .tag-engineering  { background: var(--tag-eng); color: var(--tag-eng-text); }
  .tag-ai_response  { background: var(--tag-ai); color: var(--tag-ai-text); }
  .tag-full_boq     { background: #fce7f3; color: #be185d; }
  .tag-general      { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .tag-input_required { background: #fef3c7; color: #b45309; }
  .tag-error        { background: var(--tag-err); color: var(--tag-err-text); }

  /* ── TYPING ── */
  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 2px;
  }

  .typing span {
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    opacity: 0.7;
  }

  .typing span:nth-child(2) { animation-delay: 0.18s; }
  .typing span:nth-child(3) { animation-delay: 0.36s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 16px 28px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.04);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 820px;
    margin: 0 auto;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 10px 10px 10px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(92,110,245,0.1);
  }

  .input-box {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    min-height: 24px;
    max-height: 120px;
    line-height: 1.5;
  }

  .input-box::placeholder { color: var(--muted); }

  .send-btn {
    width: 40px; height: 40px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, opacity 0.15s, background 0.15s;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(92,110,245,0.35);
  }

  .send-btn svg {
    width: 17px; height: 17px;
    fill: none;
    stroke: #fff;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .send-btn:hover { background: #4a5ce0; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .input-hint {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 9px;
    font-family: 'JetBrains Mono', monospace;
    max-width: 820px;
    margin-left: auto;
    margin-right: auto;
  }

  .input-hint kbd {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--text2);
    font-weight: 500;
  }

  /* ── HELP BUTTON ── */
  .help-btn {
    position: fixed;
    bottom: 80px;
    right: 22px;
    width: 36px; height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    box-shadow: var(--shadow-md);
    transition: all 0.2s;
    z-index: 100;
  }

  .help-btn:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 640px) {
    .suggestion-grid { grid-template-columns: repeat(2, 1fr); }
    header { padding: 12px 18px; }
    .chat-wrapper { padding: 20px 14px; }
    .input-area { padding: 12px 14px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <!-- sparkle / star icon -->
      <svg viewBox="0 0 24 24">
        <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
      </svg>
    </div>
    <div class="logo-text">Ariex <span>Cortex</span></div>
  </div>
  <div class="status-pill">
    <div class="status-dot"></div>
    AI Engine Online
  </div>
</header>

<div class="chat-wrapper" id="chatWrapper">
  <div class="welcome" id="welcome">

    <div class="welcome-icon-wrap">
      <svg viewBox="0 0 24 24">
        <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
      </svg>
    </div>

    <h2>Welcome to <span>Ariex Cortex</span></h2>
    <p>Your AI-powered civil engineering assistant. Calculate BOQ, get IS code references, and receive site advice instantly.</p>

    <div class="suggestion-grid">

      <button class="suggestion-card" onclick="sendSuggestion('Calculate footing 2 x 2 x 0.5')">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </div>
        <div class="card-content">
          <div class="card-title">Calculate footing</div>
          <div class="card-subtitle">2×2×0.5</div>
        </div>
      </button>

      <button class="suggestion-card" onclick="sendSuggestion('Calculate slab 5 x 4 x 0.15')">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <div class="card-content">
          <div class="card-title">Calculate slab</div>
          <div class="card-subtitle">5×4×0.15</div>
        </div>
      </button>

      <button class="suggestion-card" onclick="sendSuggestion('Calculate footing and slab 3 x 3 x 0.5')">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <div class="card-content">
          <div class="card-title">Full BOQ</div>
          <div class="card-subtitle">3×3×0.5</div>
        </div>
      </button>

      <button class="suggestion-card" onclick="sendSuggestion('What causes cracks in a slab?')">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div class="card-content">
          <div class="card-title">Slab crack causes</div>
          <div class="card-subtitle">Analysis</div>
        </div>
      </button>

      <button class="suggestion-card" onclick="sendSuggestion('Tell me about steel properties and grades')">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        </div>
        <div class="card-content">
          <div class="card-title">Steel info</div>
          <div class="card-subtitle">Properties</div>
        </div>
      </button>

      <button class="suggestion-card" onclick="sendSuggestion('What is the IS code for footing design?')">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </div>
        <div class="card-content">
          <div class="card-title">IS codes</div>
          <div class="card-subtitle">References</div>
        </div>
      </button>

    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row" id="inputRow">
    <textarea
      class="input-box"
      id="inputBox"
      placeholder="Ask Cortex anything... e.g. Calculate footing 2 x 2 x 0.5"
      rows="1"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="input-hint">Press <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line</div>
</div>

<div class="help-btn" title="Help">?</div>

<script>
  const chatWrapper = document.getElementById('chatWrapper');
  const inputBox    = document.getElementById('inputBox');
  const sendBtn     = document.getElementById('sendBtn');
  const welcome     = document.getElementById('welcome');

  inputBox.addEventListener('input', () => {
    inputBox.style.height = 'auto';
    inputBox.style.height = Math.min(inputBox.scrollHeight, 120) + 'px';
  });

  inputBox.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendSuggestion(text) {
    inputBox.value = text;
    sendMessage();
  }

  function scrollToBottom() {
    chatWrapper.scrollTop = chatWrapper.scrollHeight;
  }

  function addMessage(text, role) {
    if (welcome) welcome.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';

    if (role === 'user') {
      avatar.textContent = '👤';
    } else {
      avatar.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>`;
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatWrapper.appendChild(msg);
    scrollToBottom();
    return bubble;
  }

  function addAIMessage(answer, category) {
    if (welcome) welcome.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'message ai';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const tag = document.createElement('div');
    tag.className = `category-tag tag-${(category || 'general').replace(/\s+/g,'_')}`;
    tag.textContent = (category || 'general').replace(/_/g, ' ');

    const text = document.createElement('div');
    text.textContent = answer;

    bubble.appendChild(tag);
    bubble.appendChild(text);
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatWrapper.appendChild(msg);
    scrollToBottom();
  }

  function addTyping() {
    const msg = document.createElement('div');
    msg.className = 'message ai';
    msg.id = 'typingMsg';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';

    bubble.appendChild(typing);
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatWrapper.appendChild(msg);
    scrollToBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typingMsg');
    if (t) t.remove();
  }

  let conversationHistory = [];

  async function sendMessage() {
    const question = inputBox.value.trim();
    if (!question) return;

    inputBox.value = '';
    inputBox.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage(question, 'user');
    addTyping();

    try {
      const res = await fetch('/cortex/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, history: conversationHistory })
      });

      const data = await res.json();
      removeTyping();

      if (data.answer) {
        addAIMessage(data.answer, data.category || 'general');
        conversationHistory.push({ role: 'user', content: question });
        conversationHistory.push({ role: 'assistant', content: data.answer });
      } else {
        addAIMessage('Something went wrong. Please try again.', 'error');
      }
    } catch (err) {
      removeTyping();
      addAIMessage('Cannot connect to Ariex server. Make sure it is running on port 8000.', 'error');
    }

    sendBtn.disabled = false;
    inputBox.focus();
  }
</script>
</body>
</html>
